    <!-- iOS PWA self-healing: runs BEFORE React to catch fatal load errors -->
    <script>
      (function() {
        var HEAL_KEY = 'pwaHealAttempted';
        var MAX_LOAD_TIME = 12000; // 12 seconds
        
        // If we already tried healing this session, don't loop
        if (sessionStorage.getItem(HEAL_KEY) === 'true') {
          sessionStorage.removeItem(HEAL_KEY);
          return;
        }
        
        // Set a timeout - if React doesn't mount in time, trigger recovery
        var loadTimer = setTimeout(function() {
          console.warn('[PWA] App failed to load in time, triggering self-heal');
          triggerHeal();
        }, MAX_LOAD_TIME);
        
        // React will call this to cancel the timer
        window.__pwaLoadSuccess = function() {
          clearTimeout(loadTimer);
          var loader = document.getElementById('pwa-loader');
          if (loader) loader.style.display = 'none';
        };
        
        function triggerHeal() {
          sessionStorage.setItem(HEAL_KEY, 'true');
          
          // Unregister all service workers
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(function(regs) {
              regs.forEach(function(r) { r.unregister(); });
            });
          }
          
          // Clear all caches
          if ('caches' in window) {
            caches.keys().then(function(names) {
              names.forEach(function(n) { caches.delete(n); });
            });
          }
          
          // Reload after a brief delay
          setTimeout(function() {
            window.location.reload();
          }, 300);
        }
        
        // Also catch chunk load errors early
        window.addEventListener('error', function(e) {
          var msg = (e.message || e.error?.message || '').toLowerCase();
          if (msg.includes('chunk') || msg.includes('dynamically imported') || msg.includes('loading module')) {
            triggerHeal();
          }
        }, true);
      })();
    </script>
