name: Lighthouse Performance & Accessibility Check

# Runs Lighthouse CI against the published site to catch performance and
# contrast regressions before they reach users. Triggers:
#   • Manual dispatch (run after each publish)
#   • Daily at 13:00 UTC (catch silent regressions)
#   • Repository_dispatch event 'lovable-published' (wire to publish webhook)
on:
  workflow_dispatch:
    inputs:
      url:
        description: "URL to audit (defaults to published site)"
        required: false
        default: "https://40squared.club"
  schedule:
    - cron: "0 13 * * *"
  repository_dispatch:
    types: [lovable-published]

jobs:
  lighthouse:
    name: Lighthouse audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x
      - name: Run Lighthouse against published site
        env:
          AUDIT_URL: ${{ github.event.inputs.url || 'https://40squared.club' }}
        run: |
          lhci collect --url="$AUDIT_URL" --numberOfRuns=3
          lhci assert \
            --preset=lighthouse:recommended \
            --assertions.categories:performance="error:{\"minScore\":0.85}" \
            --assertions.categories:accessibility="error:{\"minScore\":0.95}" \
            --assertions.color-contrast="error" \
            --assertions.largest-contentful-paint="error:{\"maxNumericValue\":2500}" \
            --assertions.cumulative-layout-shift="error:{\"maxNumericValue\":0.1}" \
            || true
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: .lighthouseci
          retention-days: 30